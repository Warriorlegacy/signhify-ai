services:
  - type: web
    name: signhify-ai-api
    runtime: docker
    repo: https://github.com/Warriorlegacy/signhify-ai
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
